[package]
cairo-version = "2.13.1"
name = "cairo_casino"
version = "0.1.0"
edition = "2024_07"

[cairo]
sierra-replace-ids = true

[tool.scarb]
allow-prebuilt-plugins = ["dojo_cairo_macros", "snforge_std"]

[dependencies]
starknet = "2.13.1"
dojo = "1.8.0"
game_components_minigame = { git = "https://github.com/Provable-Games/game-components.git", rev = "960c84aae59239763a2a2a339e0c649b0527f07d" }
game_components_metagame = { git = "https://github.com/Provable-Games/game-components.git", rev = "960c84aae59239763a2a2a339e0c649b0527f07d" }
game_components_token = { git = "https://github.com/Provable-Games/game-components.git", rev = "960c84aae59239763a2a2a339e0c649b0527f07d" }
game_components_utils = { git = "https://github.com/Provable-Games/game-components.git", rev = "960c84aae59239763a2a2a339e0c649b0527f07d" }
openzeppelin_introspection = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v3.0.0-alpha.3" }
openzeppelin_token = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v3.0.0-alpha.3" }
openzeppelin_interfaces = { git = "https://github.com/OpenZeppelin/cairo-contracts.git", tag = "v3.0.0-alpha.3" }

[scripts]
test = "snforge test"

[dev-dependencies]
cairo_test = "2.13.1"
dojo_snf_test = "1.8.0"
snforge_std = "0.51.2"

[profile.sepolia]

[[target.starknet-contract]]
build-external-contracts = [
    "dojo::world::world_contract::world",
    "game_components_token::examples::full_token_contract::FullTokenContract",
    "game_components_token::examples::minigame_registry_contract::MinigameRegistryContract",
]
